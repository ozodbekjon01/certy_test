{% extends "admin/admin_base.html" %}
{% block title %}Shartnoma yaratish{% endblock %}
{% block content %}
<h3>Yangi Shartnoma Yaratish</h3>
<form method="POST">
    <div class="form-group">
        <label>Foydalanuvchi</label>
        <select name="user_id" required>
            <option value="">— Tanlang —</option>
            {% for user in users %}
            <option value="{{ user[0] }}">{{ user[1] }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label>Tarif</label>
        <select name="offer_id" required>
            <option value="">— Tanlang —</option>
            {% for offer in offers %}
            <option value="{{ offer[0] }}">{{ offer[1] }} — {{ offer[2] | int }} so'm</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn">✅ Yaratish</button>
    <a href="/admin/contracts" class="btn btn-danger" style="margin-left:10px;">Bekor qilish</a>
</form>
{% endblock %}
