{% extends "admin/admin_base.html" %}
{% block title %}Foydalanuvchi yaratish{% endblock %}
{% block content %}
<h3>Yangi Foydalanuvchi Yaratish</h3>
<form method="POST">
    <div class="form-group">
        <label>Login</label>
        <input type="text" name="username" placeholder="foydalanuvchi_login" required>
    </div>
    <div class="form-group">
        <label>Parol</label>
        <input type="password" name="password" placeholder="Kamida 6 ta belgi" required>
    </div>
    <div class="form-group">
        <label>Rol</label>
        <select name="role" required>
            <option value="user">Foydalanuvchi</option>
            <option value="admin">Admin</option>
        </select>
    </div>
    <div class="form-group">
        <label>Telegram ID (ixtiyoriy)</label>
        <input type="number" name="tg_id" placeholder="Masalan: 123456789">
    </div>
    <button type="submit" class="btn">✅ Yaratish</button>
    <a href="/admin/users" class="btn btn-danger" style="margin-left:10px;">Bekor qilish</a>
</form>
{% endblock %}
