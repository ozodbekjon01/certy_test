{% extends "admin/admin_base.html" %}
{% block title %}Create Offer{% endblock %}
{% block content %}
    <h3>Create New Offer</h3>
    <form method="POST">
        <div>
            <label for="offer_name">Offer Name:</label>
            <input type="text" id="offer_name" name="offer_name" required>
        </div>
        <div>
            <label for="offer_time">Time Limit (minutes):</label>
            <input type="number" id="offer_time" name="offer_time" required>
        </div>
        <div>
            <label for="price">Price (sum):</label>
            <input type="number" step="0.01" id="price" name="price" required>
        </div>
        <div>
            <label for="discount">Discount (%):</label>
            <input type="number" step="0.01" id="discount" name="discount" value="0">
        </div>
        <div>
            <label>Select Tests to Include:</label>
            <div style="margin-top: 10px; max-height: 200px; overflow-y: auto; border: 1px solid #ccc; padding: 10px;">
                {% for test in tests %}
                    <div>
                        <input type="checkbox" id="test_{{ test[0] }}" name="test_ids[]" value="{{ test[0] }}">
                        <label for="test_{{ test[0] }}">{{ test[1] }}</label>
                    </div>
                {% endfor %}
            </div>
        </div>
        <br>
        <button type="submit">Create Offer</button>
    </form>
{% endblock %}
