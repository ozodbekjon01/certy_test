{% extends "admin/admin_base.html" %}
{% block title %}Tarif yaratish{% endblock %}
{% block content %}
<h3>Yangi Tarif Yaratish</h3>
<form method="POST">
    <div class="form-group">
        <label>Tarif nomi</label>
        <input type="text" name="offer_name" placeholder="Masalan: 1 oylik tarif" required>
    </div>
    <div class="form-group">
        <label>Muddat (kun)</label>
        <input type="number" name="offer_time" placeholder="30" min="1" required>
    </div>
    <div class="form-group">
        <label>Narxi (so'm)</label>
        <input type="number" name="price" placeholder="50000" min="0" required>
    </div>
    <div class="form-group">
        <label>Chegirma (so'm)</label>
        <input type="number" name="discount" placeholder="0" min="0" value="0">
    </div>
    <div class="form-group">
        <label>Testlarni tanlang</label>
        <div style="background:#0f172a;border:1px solid #334155;border-radius:6px;padding:12px;max-height:200px;overflow-y:auto;">
            {% for test in tests %}
            <label style="display:flex;align-items:center;gap:10px;padding:6px 0;cursor:pointer;color:#f1f5f9;font-weight:400;">
                <input type="checkbox" name="test_ids[]" value="{{ test[0] }}" style="width:16px;height:16px;accent-color:#3b82f6;">
                {{ test[1] }}
            </label>
            {% else %}
            <p style="color:#64748b;font-size:14px;">Hali testlar yo'q</p>
            {% endfor %}
        </div>
    </div>
    <button type="submit" class="btn">✅ Yaratish</button>
    <a href="/admin/offers" class="btn btn-danger" style="margin-left:10px;">Bekor qilish</a>
</form>
{% endblock %}
