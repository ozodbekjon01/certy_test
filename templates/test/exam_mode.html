<!DOCTYPE html>
<html>
<head>
    <title>IC3 Exam Mode</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: black;
            color: white;
            overflow: hidden;
        }

        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 999;
        }

        .center {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        button {
            padding: 10px 20px;
            background: #3b82f6;
            border: none;
            color: white;
            cursor: pointer;
        }

        .warning {
            color: red;
        }
    </style>
</head>

<body>

<div class="overlay" id="overlay">

    <div class="center">

        <h1>IC3 EXAM SIMULATION MODE</h1>

        <p class="warning">
            Do not switch tabs. Do not refresh page. Fullscreen required.
        </p>

        <button onclick="startExam()">Start Exam</button>

    </div>

</div>

<script>

// =========================
// FULLSCREEN LOCK
// =========================

function startExam() {
    try {
        document.documentElement.requestFullscreen();
    } catch (e) {
        console.log("Fullscreen request failed");
    }
    document.getElementById("overlay").style.display = "none";
    window.location.href = "/test/exam";
}

// Right click block
document.addEventListener("contextmenu", e => e.preventDefault());

</script>

</body>
</html>
