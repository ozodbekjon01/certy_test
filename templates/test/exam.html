<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>IC3 Exam Simulator</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#0f172a;
            color:white;
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
            overflow:hidden;
            user-select:none;
        }

        /* TOPBAR */

        .topbar{
            height:60px;
            background:#1e293b;
            border-bottom:1px solid #334155;

            display:flex;
            align-items:center;
            justify-content:space-between;

            padding:0 20px;
        }

        .logo{
            font-size:20px;
            font-weight:bold;
            color:#3b82f6;
        }

        .top-actions{
            display:flex;
            align-items:center;
            gap:10px;
        }

        /* LAYOUT */

        .container{
            display:flex;
            height:calc(100vh - 60px);
        }

        /* SIDEBAR */

        .sidebar{
            width:270px;
            background:#1e293b;
            border-right:1px solid #334155;

            padding:20px;

            overflow-y:auto;
        }

        .sidebar h3{
            margin-bottom:20px;
            color:#94a3b8;
        }

        .question-grid{
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:10px;
        }

        .qbtn{
            height:45px;
            border:none;
            border-radius:8px;

            background:#334155;
            color:white;

            font-weight:bold;
            cursor:pointer;

            transition:.2s;
        }

        .qbtn:hover{
            background:#475569;
        }

        .qbtn.active{
            background:#3b82f6;
        }

        .qbtn.answered{
            background:#10b981;
        }

        .qbtn.flagged{
            background:#f59e0b;
        }

        /* MAIN */

        .main{
            flex:1;
            overflow-y:auto;

            padding:30px;
        }

        .question-box{
            background:#1e293b;
            border:1px solid #334155;
            border-radius:16px;

            padding:30px;
        }

        .question-header{
            display:flex;
            justify-content:space-between;
            align-items:center;

            border-bottom:1px solid #334155;

            padding-bottom:15px;
            margin-bottom:25px;
        }

        .question-number{
            font-size:18px;
            font-weight:bold;
            color:#94a3b8;
        }

        .question-type{
            background:#334155;
            color:#3b82f6;

            padding:6px 14px;

            border-radius:20px;

            font-size:12px;
            font-weight:bold;
            text-transform:uppercase;
        }

        .question-text{
            font-size:20px;
            line-height:1.7;

            margin-bottom:25px;
        }

        .question-image{
            width:100%;
            max-height:320px;

            object-fit:contain;

            border-radius:12px;

            margin-bottom:25px;
        }

        /* OPTIONS */

        .options-list{
            display:flex;
            flex-direction:column;
            gap:14px;
        }

        .option-card{
            background:#334155;
            border:2px solid transparent;
            border-radius:12px;

            padding:16px;

            display:flex;
            align-items:center;

            cursor:pointer;

            transition:.2s;
        }

        .option-card:hover{
            background:#475569;
        }

        .option-card.selected{
            border-color:#3b82f6;
            background:rgba(59,130,246,0.15);
        }

        .option-input{
            width:18px;
            height:18px;

            margin-right:15px;

            accent-color:#3b82f6;
        }

        .option-text{
            flex:1;
            font-size:16px;
            line-height:1.5;
        }

        .option-image{
            max-height:90px;
            border-radius:8px;

            margin-left:15px;
        }

        /* TRUE FALSE */

        .tf-row{
            background:#334155;
            border-radius:12px;

            padding:18px;

            display:grid;
            grid-template-columns:1fr 180px;

            gap:20px;

            align-items:center;
        }

        .tf-options{
            display:flex;
            gap:20px;
            justify-content:flex-end;
        }

        .tf-label{
            display:flex;
            align-items:center;
            gap:6px;
            cursor:pointer;
        }

        /* MATCHING */

        .matching-row{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:20px;

            background:#334155;
            border-radius:12px;

            padding:15px;

            margin-bottom:15px;
        }

        .matching-select{
            width:100%;

            background:#0f172a;
            color:white;

            border:1px solid #475569;
            border-radius:8px;

            padding:12px;

            font-size:15px;
        }

        /* ACTIONS */

        .bottom-actions{
            margin-top:30px;

            display:flex;
            gap:10px;
            flex-wrap:wrap;
        }

        .btn{
            border:none;
            border-radius:10px;

            padding:13px 22px;

            font-size:15px;
            font-weight:bold;

            cursor:pointer;

            transition:.2s;
        }

        .btn:hover{
            opacity:.9;
        }

        .btn-prev{
            background:#475569;
            color:white;
        }

        .btn-next{
            background:#3b82f6;
            color:white;
        }

        .btn-check{
            background:#8b5cf6;
            color:white;
        }

        .btn-finish{
            background:#ef4444;
            color:white;
        }

        .btn-flag{
            background:#f59e0b;
            color:white;
        }

        /* RESPONSIVE */

        @media(max-width:900px){

            body{
                overflow:auto;
            }

            .container{
                flex-direction:column;
                height:auto;
            }

            .sidebar{
                width:100%;
                border-right:none;
                border-bottom:1px solid #334155;
            }

            .question-grid{
                grid-template-columns:repeat(6,1fr);
            }

            .main{
                padding:15px;
            }

            .question-box{
                padding:20px;
            }

            .matching-row,
            .tf-row{
                grid-template-columns:1fr;
            }

        }

        @media(max-width:500px){

            .question-grid{
                grid-template-columns:repeat(5,1fr);
            }

            .question-text{
                font-size:18px;
            }

            .bottom-actions{
                flex-direction:column;
            }

            .btn{
                width:100%;
            }

        }

    </style>
</head>
<body>

<div class="topbar">

    <div class="logo">
        IC3 GS6 Exam Simulator
    </div>

    <div class="top-actions">

        <button class="btn btn-finish"
                onclick="finishTest()">
            Tugatish
        </button>

    </div>

</div>

<div class="container">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <h3>Savollar</h3>

        <div class="question-grid"
             id="nav-grid"></div>

    </div>

    <!-- MAIN -->

    <div class="main">

        <div class="question-box">

            <div class="question-header">

                <div class="question-number"
                     id="q-num">
                    Savol 1
                </div>

                <div class="question-type"
                     id="q-type">
                    TYPE
                </div>

            </div>

            <div class="question-body">

                <div class="question-text"
                     id="question-text">
                    Loading...
                </div>

                <img id="q-image"
                     class="question-image"
                     style="display:none;">

                <div class="options-list"
                     id="options-container"></div>

            </div>

        </div>

        <div class="bottom-actions">

            <button class="btn btn-prev"
                    onclick="navigateQ(-1)">
                Orqaga
            </button>

            <button class="btn btn-next"
                    onclick="navigateQ(1)">
                Keyingi
            </button>

            <button class="btn btn-check"
                    onclick="checkAnswer()">
                Tekshirish
            </button>

            <button class="btn btn-flag"
                    onclick="toggleFlag()">
                Flag
            </button>

        </div>

    </div>

</div>

<script>

let currentIdx = 0;
let totalQ = 0;
let currentQId = null;
let qType = "";

let questionIds = [];

let answeredQuestions = {};
let flaggedQuestions = {};

// =========================
// LOAD QUESTION
// =========================

async function loadQuestion(){

    let res = await fetch("/test/api/current");
    let data = await res.json();

    if(data.finished){
        window.location.href = "/test/finish";
        return;
    }

    currentIdx = data.index;
    totalQ = data.total;

    let q = data.question;

    currentQId = q.id;
    qType = q.type;

    questionIds = data.question_ids;

    document.getElementById("q-num").innerText =
        `Savol ${currentIdx + 1} / ${totalQ}`;

    document.getElementById("q-type").innerText =
        qType.replace("_"," ");

    document.getElementById("question-text").innerText =
        q.question_text;

    let qImage = document.getElementById("q-image");

    if(q.image){
        qImage.src = "/" + q.image;
        qImage.style.display = "block";
    }else{
        qImage.style.display = "none";
    }

    if(data.saved_answer){
        answeredQuestions[currentQId] = true;
    }

    renderOptions(data.options, data.saved_answer);

    renderSidebar();

}

// =========================
// RENDER OPTIONS
// =========================

function renderOptions(options, savedAnswer){

    let container =
        document.getElementById("options-container");

    container.innerHTML = "";

    // SINGLE CHOICE

    if(qType === "single_choice"){

        options.forEach(opt => {

            let div = document.createElement("div");

            div.className = "option-card";

            let selected =
                savedAnswer &&
                String(savedAnswer) === String(opt.id);

            if(selected){
                div.classList.add("selected");
            }

            let input = document.createElement("input");

            input.type = "radio";
            input.className = "option-input";
            input.name = "single";

            input.value = opt.id;
            input.checked = selected;

            let text = document.createElement("div");

            text.className = "option-text";
            text.innerText = opt.option_text;

            div.onclick = () => {

                document
                    .querySelectorAll(".option-card")
                    .forEach(el => {
                        el.classList.remove("selected");
                    });

                div.classList.add("selected");

                input.checked = true;

                submitAnswer(opt.id);

            };

            div.appendChild(input);
            div.appendChild(text);

            if(opt.image){
                let oimg = document.createElement("img");
                oimg.src = "/" + opt.image;
                oimg.className = "option-image";
                div.appendChild(oimg);
            }

            container.appendChild(div);

        });

    }

    // TRUE FALSE

    else if(qType === "true_false"){

        options.forEach(opt => {

            let row = document.createElement("div");

            row.className = "tf-row";

            let statement = document.createElement("div");

            statement.className = "option-text";
            statement.innerText = opt.option_text;

            let tfOptions = document.createElement("div");

            tfOptions.className = "tf-options";

            // YES

            let yesLabel = document.createElement("label");

            yesLabel.className = "tf-label";

            let yesRadio = document.createElement("input");

            yesRadio.type = "radio";
            yesRadio.name = `tf_${opt.id}`;
            yesRadio.value = "yes";

            if(
                savedAnswer &&
                savedAnswer[String(opt.id)] === "yes"
            ){
                yesRadio.checked = true;
            }

            yesRadio.onchange = saveTrueFalseAnswers;

            yesLabel.appendChild(yesRadio);
            yesLabel.appendChild(
                document.createTextNode("Yes")
            );

            // NO

            let noLabel = document.createElement("label");

            noLabel.className = "tf-label";

            let noRadio = document.createElement("input");

            noRadio.type = "radio";
            noRadio.name = `tf_${opt.id}`;
            noRadio.value = "no";

            if(
                savedAnswer &&
                savedAnswer[String(opt.id)] === "no"
            ){
                noRadio.checked = true;
            }

            noRadio.onchange = saveTrueFalseAnswers;

            noLabel.appendChild(noRadio);
            noLabel.appendChild(
                document.createTextNode("No")
            );

            tfOptions.appendChild(yesLabel);
            tfOptions.appendChild(noLabel);

            row.appendChild(statement);
            row.appendChild(tfOptions);

            container.appendChild(row);

        });

    }

    // MULTIPLE

    else if(qType === "multiple_choice"){

        options.forEach(opt => {

            let div = document.createElement("div");

            div.className = "option-card";

            let selected =
                savedAnswer &&
                Array.isArray(savedAnswer) &&
                savedAnswer.map(String)
                .includes(String(opt.id));

            if(selected){
                div.classList.add("selected");
            }

            let input = document.createElement("input");

            input.type = "checkbox";
            input.className = "option-input";

            input.value = opt.id;
            input.checked = selected;

            let text = document.createElement("div");

            text.className = "option-text";
            text.innerText = opt.option_text;

            div.onclick = () => {

                input.checked = !input.checked;

                if(input.checked){
                    div.classList.add("selected");
                }else{
                    div.classList.remove("selected");
                }

                let selectedAnswers = [];

                document
                    .querySelectorAll(".option-input:checked")
                    .forEach(chk => {

                        selectedAnswers.push(
                            parseInt(chk.value)
                        );

                    });

                submitAnswer(selectedAnswers);

            };

            div.appendChild(input);
            div.appendChild(text);

            if(opt.image){
                let oimg = document.createElement("img");
                oimg.src = "/" + opt.image;
                oimg.className = "option-image";
                div.appendChild(oimg);
            }

            container.appendChild(div);

        });

    }

    // MATCHING

    else if(qType === "matching"){

        options.forEach(opt => {

            let row = document.createElement("div");

            row.className = "matching-row";

            let left = document.createElement("div");

            left.className = "option-text";
            left.innerText = opt.option_text;

            let select = document.createElement("select");

            select.className = "matching-select";

            select.dataset.optionId = opt.id;

            let defaultOpt = document.createElement("option");

            defaultOpt.value = "";
            defaultOpt.innerText = "-- Tanlang --";

            select.appendChild(defaultOpt);

            opt.right_side_options.forEach(val => {

                let option = document.createElement("option");

                option.value = val;
                option.innerText = val;

                if(
                    savedAnswer &&
                    savedAnswer[String(opt.id)] === val
                ){
                    option.selected = true;
                }

                select.appendChild(option);

            });

            select.onchange = () => {

                let answers = {};

                document
                    .querySelectorAll(".matching-select")
                    .forEach(sel => {

                        if(sel.value){

                            answers[
                                sel.dataset.optionId
                            ] = sel.value;

                        }

                    });

                refreshMatchingSelects();
                submitAnswer(answers);

            };

            row.appendChild(left);
            row.appendChild(select);

            container.appendChild(row);

        });

        refreshMatchingSelects();

    }

}

// =========================
// MATCHING: tanlangan javoblarni boshqa selectlarda disable qilish
// =========================

function refreshMatchingSelects(){

    let selects = document.querySelectorAll(".matching-select");

    let chosen = [];
    selects.forEach(s => { if(s.value) chosen.push(s.value); });

    selects.forEach(sel => {

        Array.from(sel.options).forEach(opt => {

            if(opt.value === "") return;

            // boshqa selectda tanlangan bo'lsa disable
            opt.disabled = chosen.includes(opt.value) && sel.value !== opt.value;

        });

    });

}

// =========================
// SAVE TRUE FALSE
// =========================

function saveTrueFalseAnswers(){

    let answers = {};

    document
        .querySelectorAll('input[type="radio"]:checked')
        .forEach(radio => {

            let optionId =
                radio.name.replace("tf_","");

            answers[optionId] = radio.value;

        });

    submitAnswer(answers);

}

// =========================
// SUBMIT
// =========================

async function submitAnswer(answerData){

    answeredQuestions[currentQId] = true;

    await fetch("/test/api/submit",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            question_id:currentQId,
            answer:answerData

        })

    });

    renderSidebar();

}

// =========================
// CHECK ANSWER
// =========================

async function checkAnswer(){

    let res = await fetch(
        `/test/api/check?question_id=${currentQId}`
    );

    let data = await res.json();

    // TRUE FALSE

    if(qType === "true_false"){

        document
            .querySelectorAll(".tf-row")
            .forEach(row => {

                row.style.border = "2px solid transparent";

            });

        document
            .querySelectorAll('input[type="radio"]:checked')
            .forEach(radio => {

                let optionId =
                    radio.name.replace("tf_","");

                let correct =
                    data.tf_answers[optionId];

                let row =
                    radio.closest(".tf-row");

                if(radio.value === correct){

                    row.style.border =
                        "2px solid #10b981";

                }else{

                    row.style.border =
                        "2px solid #ef4444";

                }

            });

    }

    // MATCHING

    else if(qType === "matching"){

        document
            .querySelectorAll(".matching-select")
            .forEach(select => {

                let optionId =
                    parseInt(select.dataset.optionId);

                let correct =
                    data.correct_options.find(
                        x => x.id === optionId
                    );

                if(select.value === correct.appropriate){

                    select.style.border =
                        "2px solid #10b981";

                }else{

                    select.style.border =
                        "2px solid #ef4444";

                }

            });

    }

    // SINGLE + MULTIPLE

    else{

        document
            .querySelectorAll(".option-card")
            .forEach(card => {

                let input =
                    card.querySelector(".option-input");

                let val =
                    parseInt(input.value);

                if(data.correct_ids.includes(val)){

                    card.style.borderColor =
                        "#10b981";

                }
                else if(input.checked){

                    card.style.borderColor =
                        "#ef4444";

                }

            });

    }

}

// =========================
// NAVIGATION
// =========================

async function navigateQ(direction){

    let target = currentIdx + direction;

    if(target < 0 || target >= totalQ){
        return;
    }

    let res = await fetch("/test/api/navigate",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            index:target
        })

    });

    let data = await res.json();

    if(data.success){
        loadQuestion();
    }

}

async function jumpToQ(idx){

    let res = await fetch("/test/api/navigate",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            index:idx
        })

    });

    let data = await res.json();

    if(data.success){
        loadQuestion();
    }

}

// =========================
// SIDEBAR
// =========================

function renderSidebar(){

    let nav =
        document.getElementById("nav-grid");

    nav.innerHTML = "";

    for(let i=0;i<totalQ;i++){

        let btn =
            document.createElement("button");

        btn.className = "qbtn";

        btn.innerText = i + 1;

        let qid = questionIds[i];

        if(i === currentIdx){
            btn.classList.add("active");
        }

        if(answeredQuestions[qid]){
            btn.classList.add("answered");
        }

        if(flaggedQuestions[qid]){
            btn.classList.add("flagged");
        }

        btn.onclick = () => jumpToQ(i);

        nav.appendChild(btn);

    }

}

// =========================
// FLAG
// =========================

function toggleFlag(){

    if(flaggedQuestions[currentQId]){

        delete flaggedQuestions[currentQId];

    }else{

        flaggedQuestions[currentQId] = true;

    }

    renderSidebar();

}

// =========================
// FINISH
// =========================

function finishTest(){

    let confirmFinish =
        confirm("Testni tugatmoqchimisiz?");

    if(confirmFinish){

        window.location.href =
            "/test/finish";

    }

}

// =========================
// INIT
// =========================

loadQuestion();

</script>

</body>
</html>
